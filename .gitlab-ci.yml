# GitLab CI/CD Pipeline Configuration
stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: "10.200.99.202:15080/zero2x002/zero2x_repository:${CI_COMMIT_SHORT_SHA}-${CI_PIPELINE_ID}"
  KUBECONFIG: "/tmp/kubeconfig"

  CONTEST_ID: 2

  DATASETS: '[{"name":"itu赛道二推理数据集","uuid":"f030198b-7b11-49c4-a2a8-1f238f56eec1","path":"/input","version":"V1"}]'
  OUTPUT_DIR: '{"uuid":"f57d771e-ea0c-40a0-a161-d7b150695df6","bucket":"default","path":"output/track2/$GITLAB_USER_EMAIL","outputPath":"/output","ossName":"si000886fq1w"}'
  ENV_VARS: '[{"key":"PYTHONUNBUFFERED","value":"1"},{"key":"INPUT_DIR","value":"/input"},{"key":"OUTPUT_DIR","value":"/output"},{"key":"MODEL_DIR","value":"/workspace/artifacts/models"},{"key":"PATCH_SIZE","value":"24"},{"key":"HYDROSAT_ENABLE_CNN","value":"0"},{"key":"HYDROSAT_CALIBRATE_TEST_STATS","value":"1"},{"key":"HYDROSAT_CALIBRATE_TURBIDITY_TEST_STATS","value":"1"},{"key":"HYDROSAT_CALIBRATE_CHLA_TEST_STATS","value":"1"},{"key":"HYDROSAT_TURBIDITY_PRIOR_SHRINK","value":"0.05"},{"key":"HYDROSAT_CHLA_PRIOR_SHRINK","value":"0"},{"key":"HYDROSAT_TURBIDITY_MODE","value":"model"},{"key":"HYDROSAT_TURBIDITY_CALIBRATION","value":"lognormal_rank"},{"key":"HYDROSAT_TURBIDITY_LOGNORMAL_SIGMA","value":"0.52"},{"key":"HYDROSAT_CHLA_MODE","value":"model"}]'

  START_CMD: "./run.sh"

  ALGO_NAME: "track2"
  ALGO_TYPE: "train"
  SRC_TYPE: "image"
  ALGO_DESCRIPTION: "track2 water quality inversion"

  JOB_NAME: "track2"
  JOB_TYPE: "AI_TRAIN"
  USER_ID: "1775119847110"
  BIZ_TYPE: "DROS"

  PROJECT_UUID: "pr-1233749118618099712"
  SUBMISSION_NAME: "人工智能与太空计算挑战赛"
  COMPUTE_SPEC_UUID: "036476ce-ff2d-40a7-b750-1c443dc89a41"
  COMPUTE_SPEC_NAME: "Z2120-cuda12.8-80Gx1-8C100G"
  WORKER_NUM: 1

  RUN_TYPE: ""
  USE_TENSORBOARD: "false"
  AUTO_RESTART: "false"
  MAX_RESTARTS: 3
  RESUMEABLE: "false"
  ENABLE_SPOT_RESTART: "false"

build-job:
  stage: build
  tags:
    - k8s-itu-runner
  cache:
    key: "pip-${CI_PROJECT_ID}-${CI_COMMIT_REF_SLUG}"
    paths:
      - .pip-cache/
    policy: pull-push
  before_script:
    - echo "Waiting for Docker daemon to start..."
    - echo "$CI_PROJECT_ID"
    - echo "$CI_PIPELINE_ID"
    - echo "$CI_JOB_ID"
    - |
      timeout=60
      until docker info >/dev/null 2>&1; do
        if [ $timeout -le 0 ]; then
          echo "❌ Timeout: Docker daemon did not start"
          nc -zv docker 2375 || echo "Port 2375 unreachable"
          exit 1
        fi
        echo "Waiting... (${timeout}s remaining)"
        sleep 2
        timeout=$((timeout - 2))
      done
    - echo "✅ Docker daemon is ready"
    - docker version
    - docker info

  image: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/docker:latest
  services:
    - name: swr.cn-north-4.myhuaweicloud.com/ddn-k8s/docker.io/library/docker:dind
      alias: docker
      command:
        - "--tls=false"
        - "--insecure-registry=cr-ee.registry.cn-hangzhou-zjy-d01.res.cloud.zhejianglab.com"
        - "--insecure-registry=10.200.99.202:15080"

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
  script:
    - docker info
    - echo $DOCKER_REPOSITORY_PWD | docker login 10.200.99.202:15080 -u $DOCKER_REPOSITORY_USERNAME --password-stdin
    - docker build -t $DOCKER_IMAGE .
    - docker push $DOCKER_IMAGE
    - echo "Build completed, image pushed to ACR： $DOCKER_IMAGE"
  after_script:
    - echo "BUILD_JOB_ID=$CI_JOB_ID" > build_job_id.env
  artifacts:
    reports:
      dotenv: build_job_id.env

create-algorithm-and-job:
  stage: deploy
  tags:
    - itudemo
  image: alpine/curl:latest
  dependencies:
    - build-job
  before_script:
    - echo "Starting to create algorithm, training job and record data..."
    - echo "✅ curl installed"
    - |
      if [ -z "$OAUTH2_CLIENT_SECRET" ]; then
        echo "❌ Error: OAUTH2_CLIENT_SECRET variable is not set"
        exit 1
      fi
  script:
    - |
      GITLAB_JOB_IDS="${BUILD_JOB_ID},${CI_JOB_ID}"
      echo "GitLab Job IDs: $GITLAB_JOB_IDS"

      echo "==============================="
      echo "Step 1: Getting OAuth2 Client Token..."
      echo "==============================="

      OAUTH2_RESPONSE=$(curl -s -X POST "$OAUTH2_SERVER_URL/oauth2/client_token" \
        -H "Content-Type: application/x-www-form-urlencoded" \
        --data-urlencode "grant_type=client_credentials" \
        --data-urlencode "client_id=gitlab" \
        --data-urlencode "client_secret=$OAUTH2_CLIENT_SECRET" \
        --write-out "\n%{http_code}" \
        --connect-timeout 30)

      OAUTH2_HTTP_STATUS=$(echo "$OAUTH2_RESPONSE" | tail -n1)
      OAUTH2_RESPONSE_BODY=$(echo "$OAUTH2_RESPONSE" | sed '$d')

      echo "OAuth2 API HTTP status code: $OAUTH2_HTTP_STATUS"

      if [ "$OAUTH2_HTTP_STATUS" -ge 200 ] && [ "$OAUTH2_HTTP_STATUS" -lt 300 ]; then
        OAUTH2_TOKEN=$(echo "$OAUTH2_RESPONSE_BODY" | grep -o '"client_token":"[^"]*"' | head -1 | sed 's/"client_token":"//;s/"//g')

        if [ -z "$OAUTH2_TOKEN" ] || [ "$OAUTH2_TOKEN" = "null" ]; then
          echo "❌ Failed to obtain OAuth2 token: no client_token field in response"
          echo "Response: $OAUTH2_RESPONSE_BODY"
          exit 1
        fi
        echo "✅ OAuth2 Client Token obtained successfully"
      else
        echo "❌ Failed to obtain OAuth2 token, HTTP status code: $OAUTH2_HTTP_STATUS"
        echo "Response: $OAUTH2_RESPONSE_BODY"
        exit 1
      fi

      echo "==============================="
      echo "Step 2: Calling Java service to create algorithm, job and record data..."
      echo "==============================="

      CREATE_REQUEST_JSON="{\"contestId\":$CONTEST_ID,\"userId\":\"$USER_ID\",\"bizType\":\"$BIZ_TYPE\",\"algoName\":\"$ALGO_NAME\",\"algoType\":\"$ALGO_TYPE\",\"srcType\":\"$SRC_TYPE\",\"imageUrl\":\"$DOCKER_IMAGE\",\"algoDescription\":\"$ALGO_DESCRIPTION\",\"jobName\":\"$JOB_NAME\",\"jobType\":\"$JOB_TYPE\",\"projectUuid\":\"$PROJECT_UUID\",\"subMissionName\":\"$SUBMISSION_NAME\",\"computeSpecUuid\":\"$COMPUTE_SPEC_UUID\",\"computeSpecName\":\"$COMPUTE_SPEC_NAME\",\"workerNum\":$WORKER_NUM,\"dataSets\":$DATASETS,\"outputDir\":$OUTPUT_DIR,\"envVars\":$ENV_VARS,\"startCmd\":\"$START_CMD\",\"gitlabProjectId\":\"$CI_PROJECT_ID\",\"gitlabJobIds\":\"$GITLAB_JOB_IDS\",\"email\":\"$GITLAB_USER_EMAIL\",\"oauth2Token\":\"$OAUTH2_TOKEN\"}"
      echo "📄 [DEBUG] Request JSON: $CREATE_REQUEST_JSON"

      CREATE_RESPONSE=$(curl -s -X POST \
        "$OAUTH2_SERVER_URL/itu/createAlgorithmAndJob" \
        -H "Content-Type: application/json" \
        -H "Authorization: Bearer $OAUTH2_TOKEN" \
        -d "$CREATE_REQUEST_JSON" \
        --write-out "\n%{http_code}" \
        --connect-timeout 60 \
        --max-time 120)

      HTTP_STATUS=$(echo "$CREATE_RESPONSE" | tail -n1)
      RESPONSE_BODY=$(echo "$CREATE_RESPONSE" | sed '$d')

      echo "📄 [DEBUG] Java service response: $RESPONSE_BODY"
      echo "HTTP status code: $HTTP_STATUS"

      if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
        echo "✅ Java service call successful"
        ALGORITHM_UUID=$(echo "$RESPONSE_BODY" | grep -o '"algorithmUuid":"[^"]*"' | head -1 | sed 's/"algorithmUuid":"//;s/"//g')
        JOB_UUID=$(echo "$RESPONSE_BODY" | grep -o '"jobUuid":"[^"]*"' | head -1 | sed 's/"jobUuid":"//;s/"//g')

        if [ -z "$ALGORITHM_UUID" ] || [ -z "$JOB_UUID" ]; then
          echo "❌ Failed to parse algorithmUuid or jobUuid from response"
          exit 1
        fi

        echo "🎉 Algorithm and training job created successfully, data recorded!"
        echo "📋 Algorithm UUID: $ALGORITHM_UUID"
        echo "📋 Training job ID (Nanhu job ID): $JOB_UUID"
      else
        echo "❌ Java service call failed"
        echo "Response: $RESPONSE_BODY"
        exit 1
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
