# Scaffold only.
# Merge these path and command settings into the official competition template
# inside the provided GitLab submission repository before using it for a real run.

variables:
  DATASETS: /input
  OUTPUT_DIR: /output
  START_CMD: ./run.sh
  ENV_VARS: >-
    INPUT_DIR=/input
    OUTPUT_DIR=/output
    HYDROSAT_MODELS_DIR=/workspace/models

stages:
  - preflight

submission_wrapper_contract:
  stage: preflight
  image: python:3.12-slim
  script:
    - test "$DATASETS" = "/input"
    - test "$OUTPUT_DIR" = "/output"
    - test "$START_CMD" = "./run.sh"
    - test -f Dockerfile
    - test -f run.sh
    - test -f requirements.txt
    - test -d src
    - test -d models
  rules:
    - if: '$CI_PIPELINE_SOURCE'
